<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DI Promptų biblioteka e-komercijai — nukreipiama…</title>
  <meta name="robots" content="noindex">
  <script>
    (function () {
      try {
        var pref = localStorage.getItem('prompt-library-lang');
        if (pref === 'lt' || pref === 'en' || pref === 'et' || pref === 'lv') {
          location.replace(pref + '/');
          return;
        }
      } catch (e) { /* ignore */ }
      var list = (navigator.languages && navigator.languages.length)
        ? navigator.languages
        : [navigator.language || 'en'];
      var target = 'en/';
      for (var i = 0; i < list.length; i++) {
        var lg = String(list[i]).toLowerCase();
        if (lg === 'lt' || lg.indexOf('lt-') === 0) {
          target = 'lt/';
          break;
        }
        if (lg === 'et' || lg === 'ee' || lg.indexOf('et-') === 0 || lg.indexOf('ee-') === 0) {
          target = 'et/';
          break;
        }
        if (lg === 'lv' || lg.indexOf('lv-') === 0) {
          target = 'lv/';
          break;
        }
        if (lg.indexOf('en') === 0) {
          target = 'en/';
          break;
        }
      }
      location.replace(target);
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=en/">
  </noscript>
</head>
<body>
  <p>Perkeliama… Jei neatsidaro, pasirinkite
    <a href="lt/">Lietuvių</a>,
    <a href="en/">English</a>,
    <a href="et/">Eesti</a> arba
    <a href="lv/">Latviešu</a>.</p>
</body>
</html>
