# Quality checks on every push and PR (GitHub recommended: required checks before merge)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

# GitHub Actions: JS actions moving off Node 20 (see GitHub changelog 2025-09-19).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint, format check, validate prompts JSON
        run: npm run verify